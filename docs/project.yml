# Project manifest — remotes, deploy wiring (committed; no secrets).

project: fantastic-beasts
group: null

# Caddy terminates TLS; each hostname maps to one backend (see public.caddy, repo Caddyfile).
public:
  domain: fantasticbeastsandwheretofindthem.xyz
  dns:
  - "@"
  - www
  - test
  app:
    test: https://test.fantasticbeastsandwheretofindthem.xyz
    live: https://fantasticbeastsandwheretofindthem.xyz
  caddy:
    test:
      app: 3016
    live:
      app: 3017

mono:
  host: 104.152.211.241
  registry: registry:5000
  registry_host: 127.0.0.1:5000
  network: mono
  sonar_project_key: fantastic-beasts

remotes:
  live:
    remote: origin
    url: git@github.com:1imooo/Fantastic-Beasts.git
    branch: main
    release: release/production.yml
  test:
    remote: gitlab
    url: ssh://git@gitlab.nottinfra.co.uk:2222/nottinfra-limited/fantastic-beasts.git
    branch: develop
    release: release/test.yml

env:
  live: .env.production
  test: .env.test

staging:
  live:
    registry_tag: prod
    ports:
      host: 3017
      container: 8080
  test:
    registry_tag: test
    ports:
      host: 3016
      container: 8080
